<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaztic FC · Registro 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--n:#0a0a0a;--n2:#141414;--n3:#1c1c1c;--y:#f5c518;--y2:#d9a900;--w:#ffffff;--g:#777;--g2:#444;--ok:#22c55e;--err:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--n);font-family:'Barlow',sans-serif;color:var(--w);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 50px,rgba(245,197,24,.012) 50px,rgba(245,197,24,.012) 51px),repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(245,197,24,.012) 50px,rgba(245,197,24,.012) 51px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:0 16px 64px}
.hdr{text-align:center;padding:44px 0 0;animation:fd .6s ease both}
.logo{width:130px;height:auto;margin:0 auto 16px;display:block;filter:drop-shadow(0 0 20px rgba(245,197,24,.4)) drop-shadow(0 0 40px rgba(245,197,24,.15))}
.tn{font-family:'Bebas Neue';font-size:54px;letter-spacing:.07em;line-height:1}
.tn span{color:var(--y)}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--y);color:var(--n);font-family:'Barlow Condensed';font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 16px;border-radius:100px;margin:14px 0 26px}
.gline{height:2px;background:linear-gradient(90deg,transparent,var(--y) 30%,var(--y) 70%,transparent);opacity:.5;margin-bottom:28px}
.slbl{display:flex;align-items:center;gap:9px;margin:26px 0 11px;padding-left:2px}
.slbl .bar{width:3px;height:20px;background:var(--y);border-radius:2px;flex-shrink:0}
.slbl span{font-family:'Bebas Neue';font-size:19px;letter-spacing:.1em}
.card{background:var(--n2);border:1px solid rgba(245,197,24,.09);border-radius:12px;padding:20px;animation:fu .5s ease both}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.g2{grid-template-columns:1fr}.tn{font-size:42px}}
.fld{display:flex;flex-direction:column;gap:5px}
.fld.full{grid-column:1/-1}
label{font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g)}
label .r{color:var(--y);margin-left:2px}
input[type=text],input[type=email],input[type=date],input[type=number]{background:var(--n3);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--w);font-family:'Barlow';font-size:14px;padding:11px 13px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
input::placeholder{color:var(--g2)}
input:focus{border-color:rgba(245,197,24,.5);box-shadow:0 0 0 3px rgba(245,197,24,.06)}
input.vld{border-color:rgba(34,197,94,.4)}
input.bad{border-color:rgba(239,68,68,.4)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{padding:8px 14px;background:var(--n3);border:1px solid rgba(255,255,255,.07);border-radius:7px;color:var(--g);font-family:'Barlow Condensed';font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:rgba(245,197,24,.3);color:var(--w)}
.chip.on{background:var(--y);border-color:var(--y);color:var(--n);font-weight:700;box-shadow:0 2px 12px rgba(245,197,24,.2)}
.drow{display:flex;gap:8px;align-items:flex-end}
.drow .fld{flex:1}
.vbtn{height:44px;padding:0 16px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);border-radius:8px;color:var(--y);font-family:'Barlow Condensed';font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.vbtn:hover{background:rgba(245,197,24,.18)}
.vbtn:disabled{opacity:.4;cursor:not-allowed}
.dmsg{display:none;align-items:center;gap:7px;margin-top:8px;padding:9px 13px;border-radius:8px;font-size:13px;font-weight:500;animation:fu .3s ease both}
.dmsg.ok{display:flex;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.dmsg.no{display:flex;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171}
.sarea{margin-top:22px}
.amsg{display:none;padding:12px 16px;border-radius:9px;font-size:13px;font-weight:500;margin-bottom:12px;animation:fu .3s ease both;line-height:1.5}
.amsg.e{display:block;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171}
.sbtn{width:100%;padding:17px;background:var(--y);border:none;border-radius:10px;color:var(--n);font-family:'Bebas Neue';font-size:22px;letter-spacing:.12em;cursor:pointer;transition:all .2s}
.sbtn:hover{background:var(--y2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(245,197,24,.25)}
.sbtn:active{transform:translateY(0)}
.sbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fnote{text-align:center;font-size:11px;color:var(--g2);margin-top:12px;line-height:1.6}
.hint{font-size:11px;color:var(--g2);margin-top:-1px}
.succ{display:none;text-align:center;padding:56px 20px;animation:fu .5s ease both}
.succ.show{display:block}
.sicon{width:76px;height:76px;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.3);border-radius:50%;font-size:34px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.succ h2{font-family:'Bebas Neue';font-size:34px;color:#4ade80;letter-spacing:.06em;margin-bottom:6px}
.succ .gd{font-family:'Bebas Neue';font-size:19px;color:var(--y);letter-spacing:.08em;margin-bottom:10px}
.succ p{color:var(--g);font-size:14px;line-height:1.6}
.res{margin-top:22px;padding:16px;background:var(--n2);border:1px solid rgba(245,197,24,.1);border-radius:11px;text-align:left}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.rrow:last-child{border-bottom:none}
.rrow span:first-child{color:var(--g)}
.rrow span:last-child{font-weight:600}
@keyframes fd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--n);border-radius:50%;animation:sk .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sk{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIJMTB2j_Zm34uXox8owS12AFNJDldHAW45-82Gi_-pRMKCMT8ensWFRpPAhYjLPUz/exec';
let dorsalOk = false;
function pick(id,btn,val){btn.closest('.chips').querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById(id).value=val}
function resetD(){dorsalOk=false;document.getElementById('dmsg').className='dmsg';document.getElementById('dorsal').classList.remove('vld','bad')}
function checkDorsal(){
  const d=document.getElementById('dorsal').value.trim(),m=document.getElementById('dmsg'),b=document.getElementById('vBtn');
  if(!d||+d<1||+d>99){m.className='dmsg no';m.textContent='⚠️ Número entre 1 y 99.';return}
  b.disabled=true;b.textContent='...';m.className='dmsg';
  fetch(SCRIPT_URL+'?action=checkDorsal&dorsal='+d)
    .then(r=>r.json()).then(data=>{
      b.disabled=false;b.textContent='Verificar';
      if(data.disponible){dorsalOk=true;m.className='dmsg ok';m.textContent='✅ Dorsal #'+d+' disponible.';document.getElementById('dorsal').classList.add('vld')}
      else{dorsalOk=false;m.className='dmsg no';m.textContent='❌ Dorsal #'+d+' ocupado. Elige otro.';document.getElementById('dorsal').classList.add('bad')}
    }).catch(()=>{b.disabled=false;b.textContent='Verificar';dorsalOk=true;m.className='dmsg ok';m.textContent='✅ Dorsal #'+d+' registrado (sin conexión).'})
}
function alert2(t){const el=document.getElementById('amsg');el.textContent=t;el.className='amsg e';el.scrollIntoView({behavior:'smooth',block:'center'})}
function enviar(){
  const g=id=>document.getElementById(id).value.trim();
  const nombre=g('nombre'),cedula=g('cedula'),fn=g('fechaNac'),tel=g('telefono'),dorsal=g('dorsal'),pos=g('pos'),pie=g('pie'),talla=g('talla'),cnom=g('cnom'),ctel=g('ctel');
  if(!nombre)return alert2('⚠️ El nombre completo es obligatorio.');
  if(!cedula)return alert2('⚠️ La cédula es obligatoria.');
  if(!fn)return alert2('⚠️ La fecha de nacimiento es obligatoria.');
  if(!tel)return alert2('⚠️ El teléfono celular es obligatorio.');
  if(!dorsal)return alert2('⚠️ Escribe un número de dorsal.');
  if(!dorsalOk)return alert2('⚠️ Verifica la disponibilidad del dorsal primero.');
  if(!pos)return alert2('⚠️ Selecciona tu posición.');
  if(!pie)return alert2('⚠️ Selecciona tu pie dominante.');
  if(!talla)return alert2('⚠️ Selecciona tu talla de uniforme.');
  if(!cnom)return alert2('⚠️ El nombre del contacto de emergencia es obligatorio.');
  if(!ctel)return alert2('⚠️ El teléfono de emergencia es obligatorio.');
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>ENVIANDO...';
  document.getElementById('amsg').className='amsg';
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'registro',nombre,cedula,fechaNac:fn,telefono:tel,correo:g('correo'),ciudad:g('ciudad'),dorsal,posicion:pos,pie,talla,nombreCamiseta:g('nomCam'),contactoNombre:cnom,contactoTel:ctel,contactoTelAlt:g('ctel2'),timestamp:new Date().toISOString()})})
  .then(r=>r.json()).then(data=>{
    if(data.ok)exito(nombre,dorsal,pos,talla);
    else{btn.disabled=false;btn.innerHTML='⚽ REGISTRARME EN GALAZTIC FC';alert2('❌ '+(data.error||'Error al enviar.'))}
  }).catch(()=>{btn.disabled=false;btn.innerHTML='⚽ REGISTRARME EN GALAZTIC FC';alert2('⚠️ Sin conexión al servidor.')})
}
function exito(nombre,dorsal,pos,talla){
  document.getElementById('fw').style.display='none';
  const s=document.getElementById('succ');s.classList.add('show');
  document.getElementById('smsg').textContent=nombre.split(' ')[0]+', tu registro fue enviado. El cuerpo técnico te contactará pronto.';
  document.getElementById('res').innerHTML=r('👤','Nombre',nombre)+r('🔢','Dorsal','#'+dorsal)+r('📍','Posición',pos)+r('👕','Talla',talla);
  s.scrollIntoView({behavior:'smooth'})
}
function r(e,l,v){return '<div class="rrow"><span>'+e+' '+l+'</span><span>'+v+'</span></div>'}
</script>
</body>
